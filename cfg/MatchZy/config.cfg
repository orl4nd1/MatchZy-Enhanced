// This config file is executed when MatchZy plugin is loaded.
// Do not add commands other than MatchZy/CSSharp cvars.
//
// Reading tip:
// - Each setting block has: what it does + Default: X
// - The line with `matchzy_* ...` is the value you are setting (i.e. what changed)

// ============================================================================
// CORE MATCH FLOW (MOST IMPORTANT)
// ============================================================================
// Which mode MatchZy starts in on plugin load.
// 0 = neither (idle), 1 = match mode, 2 = practice mode.
// Default: 1
matchzy_autostart_mode 1

// If true, server becomes "match mode only": no match loaded -> kick everyone / prevent joining.
// Use case: tournament servers where only pre-loaded match players should be able to play.
// Default: false
matchzy_kick_when_no_match_loaded false

// Default whitelist toggle state. (Admins can toggle via `.whitelist`.)
// Default: false
matchzy_whitelist_enabled_default false

// Default knife-round requirement. (Admins can toggle via `.roundknife`.)
// Default: true
matchzy_knife_enabled_default true

// Default playout mode (play max rounds). (Admins can toggle via `.playout`.)
// Default: false
matchzy_playout_enabled_default false

// Minimum ready players required to start a match.
// 0 means "everyone connected must ready".
// Default: 0
matchzy_minimum_ready_required 0

// Allow admins to force ready players during match setup (`!forceready`).
// Default: true
matchzy_allow_force_ready true

// Reset match JSON cvar overrides back to originals at series end.
// Default: true
matchzy_reset_cvars_on_series_end true

// ============================================================================
// READY / AUTO-READY (COMMON)
// ============================================================================
// Automatically simulate players typing `.ready` when they become eligible.
// Use case: fast scrims or managed environments where players are expected ready on join.
// Default: false
matchzy_autoready_enabled true

// Countdown delay (seconds) once auto-ready conditions are met.
// Default: 5
matchzy_autoready_start_delay 5

// Delay (seconds) after team assignment before checking ready state.
// Use case: increase if your server/team-change events arrive before Team is fully set.
// Default: 0.3
matchzy_autoready_check_delay 0.3

// Delay (seconds) before auto-ready simulates `.ready` (also used for sim bots).
// Default: 2
matchzy_autoready_ready_delay 2

// If a host panel (e.g. KitsuneLab) stops the server when matchzy_tournament_status becomes
// "live", set this to `playing` so MatchZy still treats the match as in progress internally.
// Default: live
// matchzy_tournament_go_live_status playing

// ============================================================================
// DEMOS & SERIES END (COMMON)
// ============================================================================
// Automatically start demo recording when the match goes live.
// Note: requires GOTV (`tv_enable 1`) to actually record.
// Default: true
matchzy_demo_recording_enabled true

// Demo save path relative to `csgo/` (must end with `/`).
// Default: MatchZy/
matchzy_demo_path MatchZy/

// Demo filename format (without .dem). Available tokens:
// {TIME}, {MATCH_ID}, {MAP}, {MAPNUMBER}, {TEAM1}, {TEAM2}
// Default: "{TIME}_{MATCH_ID}_{MAP}_{TEAM1}_vs_{TEAM2}"
matchzy_demo_name_format "{TIME}_{MATCH_ID}_{MAP}_{TEAM1}_vs_{TEAM2}"

// Extra delay before kicking players at series end (added to `mp_match_restart_delay`).
// Default: 5
matchzy_series_end_kick_delay_no_demo 5

// Extra delay when demos are enabled but no upload URL is configured.
// Default: 10
matchzy_series_end_kick_delay_demo_no_upload 10

// Extra delay when demos are enabled and upload URL is configured (to allow upload).
// Default: 60
matchzy_series_end_kick_delay_demo_upload 60

// ============================================================================
// PAUSES (COMMON)
// ============================================================================
// If true, `.pause` behaves like tactical pause; otherwise it's a normal pause.
// Default: false
matchzy_use_pause_command_for_tactical_pause false

// Enable `.tech` command.
// Default: true
matchzy_enable_tech_pause true

// Permission flag required for `.tech`. Empty means anyone can use it.
// Default: ""
matchzy_tech_pause_flag ""

// Tech pause duration (seconds). Set -1 for infinite.
// Default: 300
matchzy_tech_pause_duration 300

// Max number of tech pauses per team.
// Default: 2
matchzy_max_tech_pauses_allowed 2

// Pause after round restore (`.stop`) so players can coordinate before resuming.
// Default: true
matchzy_pause_after_restore true

// Require both teams to `.unpause` for non-admin pauses.
// Default: true
matchzy_both_teams_unpause_required true

// Maximum pauses per team (0 = unlimited).
// Default: 0
matchzy_max_pauses_per_team 0

// Maximum pause duration seconds (0 = unlimited).
// Default: 0
matchzy_pause_duration 0

// ============================================================================
// CHAT / UI (COMMON)
// ============================================================================
// MatchZy chat prefix used for most messages.
// Default: "[{Green}MatchZy{Default}]"
matchzy_chat_prefix [{Green}MatchZy{Default}]

// Prefix for admin chat (`.asay`).
// Default: "[{Red}ADMIN{Default}]"
matchzy_admin_chat_prefix [{Red}ADMIN{Default}]

// Delay (seconds) before repeating reminder messages (unready list, paused reminder, etc).
// Default: 13
matchzy_chat_messages_timer_delay 13

// Show credits message on match start.
// Default: true
matchzy_show_credits_on_match_start true

// Hostname format while a match is running. Tokens: {TEAM1}, {TEAM2}, etc.
// Set "" to disable and keep your own hostname.
// Default: "{TEAM1} vs {TEAM2}"
matchzy_hostname_format "{TEAM1} vs {TEAM2}"

// Optional “match is starting” message. Use $$$ for new lines. Set "" to disable.
// Default: ""
matchzy_match_start_message ""

// Center-screen HTML notifications (match live, pause, side selection, etc).
// Default: false
matchzy_center_html_notifications false

// Center notification durations.
// Default: 5
matchzy_notification_duration_global 5
// Default: 6
matchzy_notification_duration_player 6

// ============================================================================
// GAMEPLAY / QUALITY OF LIFE (LESS IMPORTANT)
// ============================================================================
// Damage report after each round.
// Default: true
matchzy_enable_damage_report true

// Player-specific smoke color.
// Default: false
matchzy_smoke_color_enabled false

// Save nades globally (shared) instead of per-player.
// Default: false
matchzy_save_nades_as_global_enabled false

// Max number of saved grenade “last nades” per-map per-client (0 = unlimited).
// Default: 512
matchzy_max_saved_last_grenades 512

// Enable `.stop` (round restore) command.
// Default: false
matchzy_stop_command_available false

// If true, `.stop` becomes unavailable after opposing-team damage occurs.
// Default: false
matchzy_stop_command_no_damage false

// ============================================================================
// DEBUG & LOGGING (RECOMMENDED)
// ============================================================================
// Print debug logs into in-game chat (very spammy).
// Default: false
matchzy_debug_chat false

// Print verbose debug logs into the server console.
// Default: true
matchzy_debug_console true

// Master switch for event/webhook sending + retry queue.
// Default: true
matchzy_events_enabled true

// Transition breadcrumbs (warmup/knife/live checkpoints) to a log file.
// Writes to: addons/counterstrikesharp/plugins/MatchZy/logs/matchzy_breadcrumbs.log
// Default: true
matchzy_crash_debug_breadcrumbs true

// ============================================================================
// ENHANCED FEATURES (OPTIONAL)
// ============================================================================
// Side selection timer after knife.
// Default: true
matchzy_side_selection_enabled true

// Side selection time limit in seconds.
// Default: 60
matchzy_side_selection_time 60

// Reminder interval for side selection messages (seconds).
// Default: 10
matchzy_side_selection_reminder_interval 10

// Enable `.gg` vote-forfeit.
// Default: false
matchzy_gg_enabled false

// Percent of team required to `.gg` (0.0 - 1.0).
// Default: 0.8
matchzy_gg_threshold 0.8

// Minimum score difference required before `.gg` is allowed (0 disables).
// Default: 0
matchzy_gg_min_score_diff 0

// FFW (forfeit/walkover) when a team fully disconnects.
// Default: false
matchzy_ffw_enabled false

// Time before forfeit (seconds) once a team is missing.
// Default: 240
matchzy_ffw_time 240

// FFW check/warning interval (seconds).
// Default: 10
matchzy_ffw_check_interval 10

// ============================================================================
// OPTIONAL API INTEGRATIONS (TYPICALLY SET BY TOURNAMENT PLATFORMS)
// ============================================================================
// Remote log webhook URL for match events. Leave empty to disable.
// Default: ""
matchzy_remote_log_url ""

// Optional custom header for remote log endpoint.
// Default: ""
matchzy_remote_log_header_key ""
// Default: ""
matchzy_remote_log_header_value ""

// Demo upload URL (HTTP). Leave empty to disable uploads.
// Default: ""
matchzy_demo_upload_url ""

// Optional custom header for demo upload.
// Default: ""
matchzy_demo_upload_header_key ""
// Default: ""
matchzy_demo_upload_header_value ""

// Match report upload endpoint.
// Default: ""
matchzy_report_endpoint ""

// Match report server ID.
// Default: ""
matchzy_report_server_id ""

// Match report token (sent as header).
// Default: ""
matchzy_report_token ""

// Event retry interval in seconds.
// Default: 30
matchzy_event_retry_interval 30

// Event cleanup interval in seconds.
// Default: 3600
matchzy_event_cleanup_interval 3600

// Remote backup upload URL.
// Default: ""
matchzy_remote_backup_url ""

// Optional custom header for remote backup upload.
// Default: ""
matchzy_remote_backup_header_key ""
// Default: ""
matchzy_remote_backup_header_value ""

// ============================================================================
// DEV / TESTING HELPERS (OPTIONAL - KEEP DISABLED ON PRODUCTION)
// ============================================================================
// Give everyone admin (development only).
// Default: false
matchzy_everyone_is_admin false

// Auto-ready simulation helper (development/testing only).
// Spawns 2 bots during warmup (1 CT + 1 T) so you can test ready/auto-ready without joining.
// Default: false
matchzy_autoready_simulation_enabled false

// Delay between spawning the two testing bots (seconds).
// Default: 5
matchzy_autoready_simulation_bot_spawn_delay 5

// Allow starting knife/live with 0 humans connected while simulation is active.
// WARNING: can still be risky on some CS2 versions; keep off unless testing.
// Default: false
matchzy_autoready_simulation_allow_start_without_humans false

// When starting knife with 0 humans, use the safe/diagnostic knife transition modes.
// If false, MatchZy behaves like a normal server and `exec`s `MatchZy/knife.cfg` immediately.
// Default: false
matchzy_autoready_simulation_knife_use_safe_mode false

// Safe/diagnostic knife transition mode (only used when `knife_use_safe_mode` is true).
// 0=restart_then_warmup_end, 1=warmup_end_then_restart(delayed), 2=restart_then_warmup_end(delayed), 3=warmup_end_only, 4=restart_only, 5=step_through_knife_cfg, 6=enter_knife_no_commands
// Default: 0
matchzy_autoready_simulation_knife_start_mode 0

// Delay between safe/diagnostic knife transition commands (seconds).
// Default: 0
matchzy_autoready_simulation_knife_start_command_delay 0
