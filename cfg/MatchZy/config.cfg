// This config file is executed when MatchZy plugin is loaded
// Do not add commands other than matchzy config console variables
// More configurations and variables will be coming in future updates.

// Whether whitelist is enabled by default or not. Default value: false
// This is the default value, but whitelist can be toggled by admin using .whitelist command
matchzy_whitelist_enabled_default false

// Whether knife round is enabled by default or not. Default value: true
// This is the default value, but knife can be toggled by admin using .roundknife command
matchzy_knife_enabled_default true

// Minimum ready players required to start the match. If set to 0, all connected players have to ready-up to start the match. Default: 2
matchzy_minimum_ready_required 2

// Whether players are automatically marked as ready when they join the match.
// Players can still use .unready to opt-out if they're not ready.
// Default: false (disabled for safety - prevents accidental match starts)
// Use case: Fast-paced tournaments where players are expected to be ready
matchzy_autoready_enabled false

// Whether to automatically start demo recording when the match goes live.
// When disabled, server restarts much faster after matches (10s instead of 60-90s).
// Default: true (demos enabled)
matchzy_demo_recording_enabled true

// Path of folder in which demos will be saved. If defined, it must not start with a slash and must end with a slash. Set to empty string to use the csgo root.
// Example: matchzy_demo_path MatchZy/
// A folder named MatchZy will be created in csgo folder if it does not exist and will store the recorded demos in it. Default value is MatchZy/ which means demos will be stored in MatchZy/
matchzy_demo_path MatchZy/

// Format of demo filname. You may use {TIME}, {MATCH_ID}, {MAP}, {MAPNUMBER}, {TEAM1} and {TEAM2}
// Demo files will be named according to the format specified. Do not include .dem format, it will be added automatically
// Make sure to keep {TIME} in the format to create a unique demo file everytime.
matchzy_demo_name_format "{TIME}_{MATCH_ID}_{MAP}_{TEAM1}_vs_{TEAM2}"

// Whether !stop/.stop command is enabled by default or not. Default value: false
// Note: We are using Valve backup system to record and restore the backups. In most of the cases, this should be just fine.
// But in some cases, this may not be reliable hence default value is false
matchzy_stop_command_available false

// Whether the stop command becomes unavailable if a player damages a player from the opposing team. Default: false
matchzy_stop_command_no_damage false

// Whether to use !pause/.pause command for tactical pause or normal pause (unpauses only when both teams use unpause command, for admin force-unpauses the game)
// Default value: false
matchzy_use_pause_command_for_tactical_pause false

// Whether to keep .tech command enabled or not
// Default value: true
matchzy_enable_tech_pause true

// Flag required to use tech pause. Blank for anyone
// Default value: ""
matchzy_tech_pause_flag ""

// Tech pause duration in seconds. Set -1 to keep it infinite.
// Default value: 300
matchzy_tech_pause_duration 300

// Max tech pauses allowed.
// Default value: 2
matchzy_max_tech_pauses_allowed 2

// Whether to pause the match after round restore or not. Default value: true
// Players/admins can unpause the match using !unpause/.unpause. (For players, both the teams will have to use unpause command)
matchzy_pause_after_restore true

// Chat prefix to show whenever a MatchZy message is sent to players. Default value: [{Green}MatchZy{Default}]
// Available Colors: {Default}, {Darkred}, {Green}, {LightYellow}, {LightBlue}, {Olive}, {Lime}, {Red}, {Purple}, {Grey}, {Yellow}, {Gold}, {Silver}, {Blue}, {DarkBlue}
// {BlueGrey}, {Magenta} and {LightRed}. Make sure to end your prefix with {Default} to avoid coloring the messages in your prefix color.
matchzy_chat_prefix [{Green}MatchZy{Default}]

// Chat prefix to show whenever an admin sends message using .asay <message>. Default value: [{Red}ADMIN{Default}]
// Avaiable Colors are mentioned above
matchzy_admin_chat_prefix [{Red}ADMIN{Default}]

// Number of seconds of delay before sending reminder messages from MatchZy (like unready message, paused message, etc).
// Default: 13 (Because each message is kept in chat for ~13 seconds)
// Note: Changing this timer wont affect the active timer, so if you change this setting in warmup, you will have to restart warmup to make the change effective
matchzy_chat_messages_timer_delay 13

// Whether playout (play max rounds) is enabled. Default value: false
// This is the default value, but playout can be toggled by admin using .playout command
matchzy_playout_enabled_default false

// Whether to kick all clients and prevent anyone from joining the server if no match is loaded. Default value: false
// This means if server is in match mode, a match needs to be set-up using matchzy_loadmatch/matchzy_loadmatch_url to load and configure a match
// Only players in that match will be able to join the server, else they will be kicked
matchzy_kick_when_no_match_loaded false

// Whether parameters from the cvars section of a match configuration are restored to their original values when a series ends.
// Default: true
matchzy_reset_cvars_on_series_end true

// Whether the plugin will load the match mode, the practice mode or neither by startup. 
// 0 for neither, 1 for match mode, 2 for practice mode. Default: 1
matchzy_autostart_mode 1

// Whether nades should be saved globally instead of being privated to players by default or not. Default value: false
matchzy_save_nades_as_global_enabled false

// Whether force ready using !forceready is enabled or not (Currently works in Match Setup only). Default value: True
matchzy_allow_force_ready true

// Maximum number of grenade history that may be saved per-map, per-client. Set to 0 to disable the limit and allow unlimited grenades to be stored. Default value: 512
matchzy_max_saved_last_grenades 512

// Whether player-specific smoke color is enabled or not. Default: false
matchzy_smoke_color_enabled false

// If set to true, all the players will have admin privilege. Default: false
matchzy_everyone_is_admin false

// Whether to show 'MatchZy Plugin by WD-' message on match start. Default: true
matchzy_show_credits_on_match_start true

// The server hostname to use. Set to "" to disable/use existing.
matchzy_hostname_format "{TEAM1} vs {TEAM2}"

// Whether to show damage report after each round or not. Default: true.
matchzy_enable_damage_report true

// Message to show when the match starts. Use $$$ to break message into multiple lines. Set to "" to disable.
// Available variables: {TIME}, {MATCH_ID}, {MAP}, {MAPNUMBER}, {TEAM1}, {TEAM2}, {TEAM1_SCORE}, {TEAM2_SCORE}
// Available Colors: {Default}, {Darkred}, {Green}, {LightYellow}, {LightBlue}, {Olive}, {Lime}, {Red}, {Purple}, {Grey}, {Yellow}, {Gold}, {Silver}, {Blue}, {DarkBlue}
// Example: {Green} Welcome to the server! {Default} $$$ Agent models are not allowed and may lead to {Red}disqualification!{Default}
matchzy_match_start_message ""

// Whether to show important notifications in the center of the screen (match live, pause, side selection, etc)
// If disabled, these notifications will only appear in chat. Default: false
matchzy_center_html_notifications false

// ============================================================================
// DEBUG & LOGGING CONFIGURATION
// ============================================================================
// Whether to show debug/event logs in in-game chat (e.g. event send status, warmup_end, player_connect).
// Default: false (disabled to avoid chat spam)
matchzy_debug_chat false

// Whether to write verbose debug logs to the server console.
// Default: true (enabled for server administrators)
matchzy_debug_console true

// ============================================================================
// ENHANCED FEATURES CONFIGURATION
// ============================================================================
// The following features are part of MatchZy-Enhanced and provide additional
// functionality for tournament organizers, league administrators, and players.

// ----------------------------------------------------------------------------
// ENHANCED PAUSE SYSTEM
// ----------------------------------------------------------------------------
// Whether both teams must type .unpause to resume the match (applies to non-admin pauses only).
// If false, any team can unpause immediately without waiting for the other team.
// Default: true (requires coordination between teams)
// Use case: Competitive matches where both teams should agree to resume
matchzy_both_teams_unpause_required true

// Maximum number of pauses allowed per team during a match.
// Set to 0 for unlimited pauses. Does not apply to admin/tactical pauses.
// Default: 0 (unlimited)
// Use case: Set to 2-3 for competitive leagues to prevent pause abuse
matchzy_max_pauses_per_team 0

// Maximum pause duration in seconds before automatic unpause.
// Set to 0 for no time limit. Does not apply to admin pauses.
// Default: 0 (unlimited)
// Use case: Set to 300 (5 minutes) for fast-paced tournaments
matchzy_pause_duration 0

// ----------------------------------------------------------------------------
// SIDE SELECTION SYSTEM
// ----------------------------------------------------------------------------
// Whether side selection commands (.ct/.t/.stay/.swap) are enabled after knife round.
// If disabled, players have unlimited time to choose sides.
// Default: true (timer enabled)
// Use case: Keep enabled for structured matches
matchzy_side_selection_enabled true

// Time in seconds for side selection after winning knife round.
// If time expires without a choice, a random side is selected automatically.
// Default: 60 seconds
// Use case: Set to 90-120 for high-stakes tournament matches
matchzy_side_selection_time 60

// ----------------------------------------------------------------------------
// EARLY MATCH TERMINATION (.gg COMMAND)
// ----------------------------------------------------------------------------
// Whether the .gg command is enabled for early match termination.
// When enough players from one team type .gg, the opposing team wins automatically.
// Default: false (disabled to prevent abuse)
// Use case: Enable for scrims/practice matches where quick forfeits are acceptable
matchzy_gg_enabled false

// Percentage (0.0-1.0) of team players required to type .gg for match to end.
// 0.8 = 80% of team (e.g., 4 out of 5 players in a 5v5)
// Default: 0.8 (80% team consensus)
// Use case: Set to 1.0 (100%) for ranked/competitive matches
matchzy_gg_threshold 0.8

// Minimum score difference required for the losing team to use .gg command.
// Set to 0 to disable this requirement. Example: 6 means a team can only .gg
// if they are down by at least 6 rounds (e.g., 0-6, 1-7, etc.).
// Default: 0 (no minimum score difference required)
// Use case: Set to 6-8 to prevent early forfeits in competitive matches
matchzy_gg_min_score_diff 0

// ----------------------------------------------------------------------------
// FFW (FORFEIT/WALKOVER) SYSTEM
// ----------------------------------------------------------------------------
// Whether automatic forfeit system is enabled when an entire team leaves.
// When all players from a team disconnect, a timer starts. If no one returns
// before the timer expires, the match is forfeited to the opposing team.
// Default: false (disabled - tournament specific feature)
// Use case: Enable for online tournaments to handle disconnections fairly
matchzy_ffw_enabled false

// Time in seconds before forfeit is declared when a team is completely missing.
// Players are warned every minute. If anyone rejoins, the timer is cancelled.
// Default: 240 seconds (4 minutes)
// Use case: Adjust based on expected reconnection time in your tournaments
matchzy_ffw_time 240

// ============================================================================
// ENHANCED FEATURES - COMMAND REFERENCE
// ============================================================================
// New Commands:
//   .gg          - Vote to end match early (requires team consensus)
//   .up          - Alias for .unpause
//   .p           - Alias for .pause
//
// Enhanced Commands:
//   .ct/.t       - Choose side after knife round (with timer if enabled)
//   .stay/.swap  - Choose side after knife round (with timer if enabled)
//   .pause       - Now supports per-team limits and duration limits
//   .unpause     - Now supports both-team requirement
//   .ready       - Automatically set on join if autoready enabled
//   .unready     - Can be used even with autoready enabled
// ============================================================================

// ============================================================================
// OPTIONAL API INTEGRATION CONFIGURATION
// ============================================================================
// ⚠️  IMPORTANT: The settings below are OPTIONAL and are typically configured
//     automatically by tournament platforms like MatchZy Auto Tournament (MAT).
//     You should NOT manually set these values unless you're running a custom
//     integration or self-hosting your own tournament platform.
//
//     These settings are usually set dynamically via console commands when
//     matches are loaded, and values are persisted to the database automatically.
//     Manual configuration here may be overwritten by the tournament platform.
// ============================================================================

// ----------------------------------------------------------------------------
// OPTIONAL: Remote Log / Event System Configuration
// ----------------------------------------------------------------------------
// URL to send all match events to over HTTP (webhook endpoint).
// Events include: match_started, round_end, player_ready, etc.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (disabled)
matchzy_remote_log_url ""

// Custom HTTP header name for authenticating with the remote log endpoint.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (no custom header)
matchzy_remote_log_header_key ""

// Custom HTTP header value for authenticating with the remote log endpoint.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (no custom header)
matchzy_remote_log_header_value ""

// ----------------------------------------------------------------------------
// OPTIONAL: Demo Upload Configuration
// ----------------------------------------------------------------------------
// URL to upload recorded demos to once the map ends.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (disabled)
matchzy_demo_upload_url ""

// Custom HTTP header name for authenticating with the demo upload endpoint.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (no custom header)
matchzy_demo_upload_header_key ""

// Custom HTTP header value for authenticating with the demo upload endpoint.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (no custom header)
matchzy_demo_upload_header_value ""

// ----------------------------------------------------------------------------
// OPTIONAL: Match Report Configuration
// ----------------------------------------------------------------------------
// HTTP endpoint for match report uploads (JSON snapshot of match state).
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (disabled)
matchzy_report_endpoint ""

// Server identifier to send with match report uploads.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (not set)
matchzy_report_server_id ""

// Authentication token for match report uploads (sent as x-matchzy-token header).
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (no token)
matchzy_report_token ""

// Server identifier for event tracking and match reports.
// ⚠️  This is typically set via console command (matchzy_server_id <server_id>)
//     by tournament platforms, not via config file. Leave commented out.
// matchzy_server_id ""

// ----------------------------------------------------------------------------
// OPTIONAL: Remote Backup Configuration
// ----------------------------------------------------------------------------
// URL to send backup files to over HTTP after each backup round.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (disabled)
matchzy_remote_backup_url ""

// Custom HTTP header name for authenticating with the backup upload endpoint.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (no custom header)
matchzy_remote_backup_header_key ""

// Custom HTTP header value for authenticating with the backup upload endpoint.
// ⚠️  Usually set automatically by tournament platforms. Leave empty unless
//     you're running a custom integration.
// Default: "" (no custom header)
matchzy_remote_backup_header_value ""
// ============================================================================
