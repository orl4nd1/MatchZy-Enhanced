site_name: MatchZy (Enhanced)
site_description: Enhanced CS2 MatchZy plugin tailored for tournament automation.
repo_url: https://github.com/sivert-io/MatchZy
repo_name: sivert-io/MatchZy

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy

nav:
  - Overview: index.md
  - Demo upload API: API_ENDPOINT_SPECIFICATION.md
  - Demo upload guide: DEMO_UPLOAD_GUIDE.md
  - Config loading behavior: CONFIG_LOADING_BEHAVIOR.md
  - Simulation mode (internal notes): SIMULATION_MODE_TODO.md
  - Server allocation status: SERVER_ALLOCATION_STATUS.md
  - Release notes: RELEASE.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - tables
  - footnotes


